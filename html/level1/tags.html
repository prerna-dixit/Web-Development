<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
</head>
<body>
    <h2>Tags in HTML:</h2>
    <a href="https://www.youtube.com/">YouTube</a> <!--to link another webpage-->
    <br> <!--empty line-->
    <a href="https://www.youtube.com/watch?v=Ukbry7xP6Q4" target="_blank">JJK Clip</a> <!--opens in a new tab-->
    <br>
    <img src="raccoon.jpg" alt="raccoon image"> <!--to add image, relative-->
    <br>
    <img src="https://i.pinimg.com/736x/3d/db/ac/3ddbacdbe51e43d358636c8e29729bbd.jpg"> <!--absolute url-->
    <br>
    <b>Satoru sama</b> <!--bold-->
    <br>
    <i>satoru chan</i> <!--italics-->
    <br>
    <u>satoru san</u> <!--underlined-->

</body>
</html>

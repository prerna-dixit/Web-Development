<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <table>
        <caption>Food Menu</caption>
        <thead> <!--thead, tbody, tfoot: table semantics-->
            <tr>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>15</td>
            </tr>
            <tr>
                <td>Chips</td>
                <td>20</td>
            </tr>
        </tbody>
        
    </table>

    <!--colspan and rowspan attributes-->
    <table border="pink">
        <caption>Food Menu</caption>
        <thead> 
            <tr>
                <th rowspan="2">Item</th> <!--item occupies 2 rows 1 col. hence rowspan=2-->
                <th colspan="2">Price</th> <!--price occupies 2 cols 1 row, hence colspan=2-->
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Frooti</td>
                <td>10</td>
                <td>0.11</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>15</td>
                <td>0.16</td>
            </tr>
            <tr>
                <td>Chips</td>
                <td>20</td>
                <td>0.22</td>
            </tr>
        </tbody>
        
    </table>
</body>
</html>
